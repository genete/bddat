name: Deploy Presentación a GitHub Pages

on:
  push:
    branches:
      - develop
      - feature/292-reveal-presentacion
    paths:
      - presentacion/**

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto (carpeta presentacion/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentacion/

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

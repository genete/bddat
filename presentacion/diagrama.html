<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diagrama ESFTT — BDDAT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f8f8f8; overflow: hidden; width: 100vw; height: 100vh; }
    #wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      user-select: none;
    }
    #wrap:active { cursor: grabbing; }
    #svg-img {
      transform-origin: center center;
      max-width: none;
    }
    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font: 12px/1.6 sans-serif;
      padding: 4px 14px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <img id="svg-img" src="assets/Diagrama_ESFTT.svg" draggable="false">
  </div>
  <div id="hint">Rueda: zoom · Arrastrar: mover · Doble clic: restablecer</div>

  <script>
    const wrap = document.getElementById('wrap');
    const img  = document.getElementById('svg-img');
    const hint = document.getElementById('hint');

    let scale = 1, tx = 0, ty = 0;
    let dragging = false, startX, startY, startTx, startTy;

    function applyTransform() {
      img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    }

    // Zoom con rueda
    wrap.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.min(10, Math.max(0.2, scale * delta));
      applyTransform();
    }, { passive: false });

    // Pan con ratón
    wrap.addEventListener('mousedown', e => {
      dragging = true;
      startX = e.clientX; startY = e.clientY;
      startTx = tx; startTy = ty;
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      tx = startTx + (e.clientX - startX);
      ty = startTy + (e.clientY - startY);
      applyTransform();
    });
    window.addEventListener('mouseup', () => { dragging = false; });

    // Doble clic: restablecer
    wrap.addEventListener('dblclick', () => {
      scale = 1; tx = 0; ty = 0;
      applyTransform();
    });

    // Ocultar hint tras 3s
    setTimeout(() => { hint.style.opacity = 0; }, 3000);
  </script>
</body>
</html>

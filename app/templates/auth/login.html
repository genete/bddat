{% extends "base.html" %}

{% block title %}Iniciar Sesión - BDDAT{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0">
                        <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <!-- Campo Siglas -->
                        <div class="mb-3">
                            <label for="siglas" class="form-label">
                                <i class="fas fa-user me-1"></i>Siglas de Usuario
                            </label>
                            <input type="text" 
                                   class="form-control" 
                                   id="siglas" 
                                   name="siglas" 
                                   placeholder="Ej: ADMIN, CLOPEZ..." 
                                   required 
                                   autofocus>
                        </div>

                        <!-- Campo Contraseña -->
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="fas fa-key me-1"></i>Contraseña
                            </label>
                            <input type="password" 
                                   class="form-control" 
                                   id="password" 
                                   name="password" 
                                   placeholder="Introduce tu contraseña" 
                                   required>
                        </div>

                        <!-- Botón Submit -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-sign-in-alt me-2"></i>Entrar
                            </button>
                        </div>
                    </form>

                    <!-- Enlace recuperar contraseña (futuro) -->
                    <div class="text-center mt-3">
                        <small class="text-muted">
                            ¿Olvidaste tu contraseña? 
                            <a href="#" class="text-decoration-none">(Próximamente)</a>
                        </small>
                    </div>
                </div>
                <div class="card-footer text-center text-muted">
                    <small>Sistema de Tramitación Administrativa - BDDAT</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
